><line x1="175" y1="711" x2="350" y2="711" stroke="#64748B" stroke-width="1.6" marker-end="url(#arrow)"/><line x1="265" y1="726" x2="265" y2="742" stroke="#64748B" stroke-width="1.6" marker-end="url(#arrow)"/><line x1="400" y1="726" x2="320" y2="758" stroke="#64748B" stroke-width="1.6" marker-end="url(#arrow)"/><line x1="48" y1="855" x2="1552" y2="855" stroke="#CBD5E1" stroke-width="1"/><text x="50" y="880" text-anchor="start" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="450" fill="#64748B">源码锚点：xai-grok-workspace/{handle.rs, session, capability.rs, swap_policy.rs}。ReadWrite 与 Execute 互不可比较。</text><text x="1550" y="880" text-anchor="end" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="550" fill="#64748B">Grok Build 源码架构研究 · 2026-07-19</text></svg>