="#7C3AED" stroke-width="1.2" filter="url(#shadow)"/><text x="1280" y="236" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="14" font-weight="700" fill="#0F172A">Git / Durable Store</text><line x1="1280" y1="260" x2="1280" y2="720" stroke="#CBD5E1" stroke-width="1.2" stroke-dasharray="6 7"/><line x1="120" y1="300" x2="430" y2="300" stroke="#2563EB" stroke-width="2" marker-end="url(#arrowBlue)"/><text x="275.0" y="292" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="600" fill="#2563EB">before_turn(prompt_index)</text><line x1="430" y1="345" x2="740" y2="345" stroke="#059669" stroke-width="2" marker-end="url(#arrow)"/><text x="585.0" y="337" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="600" fill="#059669">capture FS rewind point</text><line x1="430" y1="390" x2="1020" y2="390" stroke="#EA580C" stroke-width="2" marker-end="url(#arrow)"/><text x="725.0" y="382" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="600" fill="#EA580C">start / anchor Hunk delta</text><line x1="120" y1="455" x2="430" y2="455" stroke="#2563EB" stroke-width="2" marker-end="url(#arrowBlue)"/><text x="275.0" y="447" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="600" fill="#2563EB">工具执行：文件读写 / shell</text><line x1="430" y1="500" x2="740" y2="500" stroke="#059669" stroke-width="2" marker-end="url(#arrow)"/><text x="585.0" y="492" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="600" fill="#059669">FS mutations</text><line x1="430" y1="545" x2="1020" y2="545" stroke="#EA580C" stroke-width="2" marker-end="url(#arrow)"/><text x="725.0" y="537" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="600" fill="#EA580C">Hunk events（last-write-wins）</text><line x1="120" y1="610" x2="430" y2="610" stroke="#2563EB" stroke-width="2" marker-end="url(#arrowBlue)"/><text x="275.0" y="602" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="600" fill="#2563EB">after_turn(outcome)</text><line x1="430" y1="650" x2="740" y2="650" stroke="#059669" stroke-width="2" marker-end="url(#arrow)"/><text x="585.0" y="642" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="600" fill="#059669">finalize FS checkpoint</text><line x1="430" y1="690" x2="1020" y2="690" stroke="#EA580C" stroke-width="2" marker-end="url(#arrow)"/><text x="725.0" y="682" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="600" fill="#EA580C">finalize Hunk delta</text><line x1="430" y1="730" x2="1280" y2="730" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrow)"/><text x="855.0" y="722" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="600" fill="#7C3AED">optional Git + durable persist</text><rect x="600" y="756" width="720" height="62" rx="14" fill="#EEF2F7" fill-opacity="1" stroke="line" stroke-width="1"/><text x="620" y="783" text-anchor="start" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="15" font-weight="800" fill="#0F172A">RewindCheckpoint</text><rect x="780" y="772" width="115" height="30" rx="15" fill="#D1FAE5" fill-opacity="1"/><text x="837.5" y="793" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="13" font-weight="650" fill="#059669">FS point</text><rect x="910" y="772" width="125" height="30" rx="15" fill="#FFEDD5" fill-opacity="1"/><text x="972.5" y="793" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="13" font-weight="650" fill="#EA580C">Hunk delta</text><rect x="1050" y="772" width="115" height="30" rx="15" fill="#EDE9FE" fill-opacity="1"/><text x="1107.5" y="793" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="13" font-weight="650" fill="#7C3AED">Git（可选）</text><rect x="1180" y="772" width="115" height="30" rx="15" fill="#DBEAFE" fill-opacity="1"/><text x="1237.5" y="793" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="13" font-weight="650" fill="#2563EB">prompt_index</text><rect x="1328" y="280" width="224" height="420" rx="20" fill="#FFFFFF" fill-opacity="1" stroke="rose" stroke-width="1.4" filter="url(#shadow)"/><text x="1440" y="318" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="18" font-weight="800" fill="#E11D48">rewind_to(target)</text><text x="1440" y="358" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="14" font-weight="520" fill="#0F172A"><tspan x="1440" dy="0">1. 按 prompt_index</tspan><tspan x="1440" dy="27">   定位 checkpoint</tspan><tspan x="1440" dy="27"></tspan><tspan x="1440" dy="27">2. 恢复 FS 状态</tspan><tspan x="1440" dy="27"></tspan><tspan x="1440" dy="27">3. 恢复 Hunk delta</tspan><tspan x="1440" dy="27"></tspan><tspan x="1440" dy="27">4. 可选恢复 Git</tspan><tspan x="1440" dy="27"></tspan><tspan x="1440" dy="27">5. 清理 / 截断</tspan><tspan x="1440" dy="27">   目标之后状态</tspan><tspan x="1440" dy="27"></tspan><tspan x="1440" dy="27">6. 会话层同步</tspan><tspan x="1440" dy="27">   ChatState 历史</tspan></text><path d="M 1328 787 C 1370 760, 1390 720, 1395 700" fill="none" stroke="#E11D48" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrowRose)"/><rect x="48" y="826" width="1504" height="28" rx="10" fill="#FFE4E6" fill-opacity="1" stroke="rose" stroke-width="1"/><text x="800" y="846" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="650" fill="#E11D48">默认通常在 Completed 边界 finalize；非 Completed 结果是否保留由 workspace_rewind_all_outcomes 配置控制。</text><line x1="48" y1="855" x2="1552" y2="855" stroke="#CBD5E1" stroke-width="1"/><text x="50" y="880" text-anchor="start" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="450" fill="#64748B">源码锚点：xai-grok-workspace/session/checkpoint.rs、handle.rs rewind metrics、xai-hunk-tracker 与 ChatState truncate 路径。</text><text x="1550" y="880" text-anchor="end" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="550" fill="#64748B">Grok Build 源码架构研究 · 2026-07-19</text></svg>