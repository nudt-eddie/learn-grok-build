 sans-serif" font-size="12" font-weight="600" fill="#EA580C">ToolOutput + prompt_text</text><line x1="1080" y1="662" x2="670" y2="662" stroke="#2563EB" stroke-width="2" marker-end="url(#arrowBlue)"/><text x="875.0" y="654" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="600" fill="#2563EB">push_tool_result</text><line x1="670" y1="704" x2="875" y2="704" stroke="#0891B2" stroke-width="2" marker-end="url(#arrowBlue)"/><text x="772.5" y="696" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="600" fill="#0891B2">继续采样 / 最终响应</text><line x1="875" y1="744" x2="670" y2="744" stroke="#2563EB" stroke-width="2" marker-end="url(#arrowBlue)"/><text x="772.5" y="736" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="600" fill="#2563EB">AssistantResponse</text><line x1="270" y1="786" x2="470" y2="786" stroke="#059669" stroke-width="2" marker-end="url(#arrow)"/><text x="370.0" y="778" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="600" fill="#059669">on_turn_done / error / abort</text><rect x="600" y="296" width="140" height="478" rx="18" fill="#DBEAFE" fill-opacity="0.35" stroke="blue" stroke-width="1.2"/><text x="670" y="767" text-anchor="middle" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="700" fill="#2563EB">同一 Actor 内顺序处理</text><rect x="1015" y="219" width="520" height="102" rx="16" fill="#FFE4E6" fill-opacity="1" stroke="rose" stroke-width="1.2" filter="url(#shadow)"/><text x="1035" y="251" text-anchor="start" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="17" font-weight="750" fill="#E11D48">取消安全旁路</text><text x="1035" y="278" text-anchor="start" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="13" font-weight="500" fill="#0F172A"><tspan x="1035" dy="0">CancelToken / 用户取消 → ToolBridge.terminal → kill_foreground_commands</tspan><tspan x="1035" dy="22">不等待正在被 call() 持有的 registry lock</tspan></text><path d="M 270 250 C 650 210, 920 230, 1080 270" fill="none" stroke="#E11D48" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrowRose)"/><path d="M 1225 321 C 1320 350, 1410 360, 1460 390" fill="none" stroke="#E11D48" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrowRose)"/><rect x="48" y="806" width="1504" height="38" rx="12" fill="#EEF2F7" fill-opacity="1" stroke="line" stroke-width="1"/><text x="70" y="831" text-anchor="start" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="13" font-weight="650" fill="#0F172A">重要语义：Lifecycle Contributor 只接收数据输入并调用安装时注入的 capability；它不接管 turn loop。</text><line x1="48" y1="855" x2="1552" y2="855" stroke="#CBD5E1" stroke-width="1"/><text x="50" y="880" text-anchor="start" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="450" fill="#64748B">源码锚点：xai-chat-state/actor、xai-agent-lifecycle、xai-grok-tools/bridge.rs；时序为核心成功路径与取消旁路。</text><text x="1550" y="880" text-anchor="end" font-family="'Noto Sans CJK SC', 'Inter', sans-serif" font-size="12" font-weight="550" fill="#64748B">Grok Build 源码架构研究 · 2026-07-19</text></svg>